# supabase/config.toml — edge-function entrypoints
#
# Each function's TypeScript file is named after the function itself
# (govcon-discover/govcon-discover.ts) instead of the default index.ts,
# so downloads and code review are unambiguous. Supabase's CLI looks for
# index.ts unless told otherwise — these entries tell it otherwise.
#
# If you deploy by PASTING code in the Supabase dashboard, you don't need
# this file at all — the dashboard doesn't care what the file was called.
#
# Place this content inside your project's supabase/config.toml (merge with
# what's already there), with the functions living at:
#   supabase/functions/<name>/<name>.ts
#   supabase/functions/_shared/*.ts

[functions.autopilot-run]
entrypoint = "./functions/autopilot-run/autopilot-run.ts"

[functions.govcon-ai]
entrypoint = "./functions/govcon-ai/govcon-ai.ts"
verify_jwt = false   # function verifies the user JWT itself; lets the CORS preflight through

[functions.oo-config]
entrypoint = "./functions/oo-config/oo-config.ts"

[functions.oo-callback]
entrypoint = "./functions/oo-callback/oo-callback.ts"
verify_jwt = false   # the OnlyOffice doc server calls this, not a signed-in user

[functions.scrape-ingest]
entrypoint = "./functions/scrape-ingest/scrape-ingest.ts"
verify_jwt = false   # authenticates with the per-user ingest_token instead

[functions.govcon-discover]
