<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion Two | Template Fields</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --ink:#0f1b2d; --muted:#5f6b7a; --faint:#93a0b3; --line:#dce5f0; --bg:#eef3f9; --surface:#fff;
  --blue-700:#0054d1; --blue-600:#0068ff; --blue-500:#1683ff; --blue-050:#eaf3ff; --navy:#061a3a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased;font-size:14px}
button,select,input{font:inherit}
.app{display:flex;flex-direction:column;height:100dvh}

.header{height:58px;flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:0 20px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:9px}
.c2{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:linear-gradient(135deg,var(--navy),var(--blue-700));color:#fff;font-weight:800;font-size:.78rem}
.brand b{font-weight:800;color:var(--navy)}
.doc-name{color:var(--muted);font-weight:600;font-size:.86rem;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{height:38px;padding:0 16px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;font-size:.86rem;cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--blue-500)}
.btn-primary{background:var(--blue-700);border-color:var(--blue-700);color:#fff}
.btn-primary:hover{background:var(--navy)}
.saved-tag{color:#0f9f6e;font-weight:700;font-size:.84rem;opacity:0;transition:.2s}
.saved-tag.show{opacity:1}

.main{flex:1;display:grid;grid-template-columns:248px 1fr;min-height:0}
.tools{background:#fff;border-right:1px solid var(--line);padding:18px 14px;overflow:auto}
.tool-label{color:var(--faint);font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin:6px 6px 8px}
.signer-row{display:flex;gap:8px;margin-bottom:14px}
.signer-select{flex:1;height:38px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;font-weight:700;color:var(--ink)}
.add-signer{width:38px;height:38px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:1.2rem;color:var(--blue-700);font-weight:800}
.add-signer:hover{border-color:var(--blue-500)}
.palette{display:grid;gap:7px}
.tool{display:flex;align-items:center;gap:10px;height:42px;padding:0 12px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;font-weight:700;color:var(--ink);text-align:left;transition:.14s}
.tool:hover{border-color:var(--blue-500);background:var(--blue-050)}
.tool.armed{border-color:var(--blue-700);background:var(--blue-050);box-shadow:0 0 0 3px rgba(0,104,255,.12)}
.tool .ic{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;background:var(--blue-050);color:var(--blue-700);font-size:.7rem;font-weight:900;flex:0 0 auto}
.hint{margin-top:14px;padding:11px 12px;border:1px dashed #bcd3ef;background:var(--blue-050);border-radius:10px;color:var(--muted);font-size:.78rem;line-height:1.5}

.stage{overflow:auto;padding:26px;display:flex;flex-direction:column;align-items:center;gap:18px}
.page-wrap{position:relative;background:#fff;box-shadow:0 1px 0 rgba(6,26,58,.08),0 16px 40px rgba(6,26,58,.14);border-radius:4px;overflow:hidden}
.page-wrap.armed{cursor:crosshair}
.fld{position:absolute;border:1.5px solid;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;cursor:move;user-select:none;overflow:visible}
.fld .lbl{pointer-events:none;white-space:nowrap;opacity:.9;padding:0 4px;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.fld .del{position:absolute;top:-10px;right:-10px;width:20px;height:20px;border-radius:50%;background:#e11d48;color:#fff;border:2px solid #fff;font-size:.7rem;font-weight:900;cursor:pointer;display:grid;place-items:center;line-height:1}
.fld .rsz{position:absolute;right:-6px;bottom:-6px;width:13px;height:13px;border-radius:3px;background:#fff;border:2px solid currentColor;cursor:se-resize}
.loading{padding:50px;color:var(--muted)}

@media (max-width:820px){
  .main{grid-template-columns:1fr}
  .tools{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;max-height:46vh;border-right:0;border-top:1px solid var(--line);z-index:40}
  .stage{padding:14px 8px 48vh}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand"><div class="c2">C2</div><b>Connexion Two</b></div>
    <span class="doc-name" id="docName">Loading…</span>
    <div class="header-right">
      <span class="saved-tag" id="savedTag">Saved ✓</span>
      <a class="btn" href="/templates">Back</a>
      <button class="btn btn-primary" id="saveBtn" type="button">Save Fields</button>
    </div>
  </div>

  <div class="main">
    <aside class="tools">
      <div class="tool-label">Signer</div>
      <div class="signer-row">
        <select class="signer-select" id="signerSelect"></select>
        <button class="add-signer" id="addSigner" type="button" title="Add signer">+</button>
      </div>
      <div class="tool-label">Add Field — click a type, then click the page</div>
      <div class="palette" id="palette"></div>
      <div class="hint">Click a field type, then click on the document to drop it. Drag to move, use the corner to resize, and the red dot to delete. Fields are color-coded per signer.</div>
    </aside>

    <section class="stage" id="stage"><div class="loading">Loading document…</div></section>
  </div>
</div>

<script>
const SB_URL='https://rfdvogakvyodixgpvqvz.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZHZvZ2FrdnlvZGl4Z3B2cXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMzU4MDMsImV4cCI6MjA4MjYxMTgwM30.UumTuz6AaKL8uYmmNxFj1ec5CInHVNQowt6LRo4cu-E';
const TEMPLATE_BUCKET='template-files';
const sb=supabase.createClient(SB_URL,SB_KEY);
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const params=new URLSearchParams(location.search);
const templateId=params.get('id');

const FIELD_TYPES=[
  {t:'signature',label:'Signature',ic:'Sig',w:.24,h:.06},
  {t:'initials', label:'Initials', ic:'In', w:.10,h:.05},
  {t:'name',     label:'Full Name',ic:'Nm', w:.22,h:.04},
  {t:'date',     label:'Date',     ic:'Dt', w:.16,h:.04},
  {t:'text',     label:'Text',     ic:'Tx', w:.22,h:.04},
  {t:'address',  label:'Address',  ic:'Ad', w:.30,h:.05},
  {t:'ssn',      label:'SSN',      ic:'SSN',w:.18,h:.04},
  {t:'ein',      label:'EIN',      ic:'EIN',w:.18,h:.04},
  {t:'checkbox', label:'Checkbox', ic:'☑',  w:.03,h:.03},
];
const SIGNER_COLORS=['#0054d1','#0f9f6e','#b7791f','#7c3aed','#d6336c','#0891b2','#ea580c','#475569'];

let pages=[];            // {wrap, wPx, hPx, pageNum}
let placed=[];           // {id, type, signer, page, xPct, yPct, wPct, hPct, el}
let armedType=null;
let signers=[1];
let currentSigner=1;
let nextId=1;

function colorFor(signer){ return SIGNER_COLORS[(signer-1)%SIGNER_COLORS.length]; }
function defFor(type){ return FIELD_TYPES.find(f=>f.t===type)||{w:.2,h:.04}; }

// ---------- palette + signer UI ----------
function buildPalette(){
  const p=document.getElementById('palette');
  p.innerHTML=FIELD_TYPES.map(f=>`<button class="tool" type="button" data-type="${f.t}"><span class="ic">${f.ic}</span>${f.label}</button>`).join('');
  p.querySelectorAll('.tool').forEach(btn=>btn.addEventListener('click',()=>armType(btn.dataset.type)));
}
function armType(type){
  armedType = armedType===type ? null : type;
  document.querySelectorAll('.tool').forEach(b=>b.classList.toggle('armed', b.dataset.type===armedType));
  document.querySelectorAll('.page-wrap').forEach(w=>w.classList.toggle('armed', !!armedType));
}
function refreshSigners(){
  const sel=document.getElementById('signerSelect');
  sel.innerHTML=signers.map(s=>`<option value="${s}">Signer ${s}</option>`).join('');
  sel.value=String(currentSigner);
}
document.getElementById('addSigner').addEventListener('click',()=>{
  const n=signers.length+1; signers.push(n); currentSigner=n; refreshSigners();
});
document.getElementById('signerSelect').addEventListener('change',e=>{ currentSigner=Number(e.target.value); });

// ---------- render PDF ----------
async function renderPdf(url){
  const stage=document.getElementById('stage');
  stage.innerHTML='';
  const pdf=await pdfjsLib.getDocument(url).promise;
  const scale=Math.min(1.4,(stage.clientWidth-60)/ (await pdf.getPage(1)).getViewport({scale:1}).width);
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const vp=page.getViewport({scale});
    const wrap=document.createElement('div');
    wrap.className='page-wrap'+(armedType?' armed':'');
    wrap.style.width=vp.width+'px'; wrap.style.height=vp.height+'px';
    wrap.dataset.page=p;
    const canvas=document.createElement('canvas');
    const dpr=window.devicePixelRatio||1;
    canvas.width=Math.floor(vp.width*dpr); canvas.height=Math.floor(vp.height*dpr);
    canvas.style.width=vp.width+'px'; canvas.style.height=vp.height+'px';
    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    wrap.appendChild(canvas);
    wrap.addEventListener('pointerdown',e=>onPageClick(e,wrap,p));
    stage.appendChild(wrap);
    pages.push({wrap,wPx:vp.width,hPx:vp.height,pageNum:p});
  }
}

function onPageClick(e,wrap,pageNum){
  if(!armedType) return;
  if(e.target!==wrap && e.target.tagName!=='CANVAS') return; // ignore clicks on existing fields
  const rect=wrap.getBoundingClientRect();
  const d=defFor(armedType);
  const xPct=Math.max(0,Math.min(1-d.w,(e.clientX-rect.left)/rect.width - d.w/2));
  const yPct=Math.max(0,Math.min(1-d.h,(e.clientY-rect.top)/rect.height - d.h/2));
  addField({type:armedType,signer:currentSigner,page:pageNum,xPct,yPct,wPct:d.w,hPct:d.h});
}

// ---------- field elements ----------
function addField(f){
  const pg=pages.find(p=>p.pageNum===f.page); if(!pg) return;
  const id=nextId++;
  const el=document.createElement('div');
  el.className='fld';
  const col=colorFor(f.signer);
  el.style.color=col; el.style.borderColor=col; el.style.background=hexA(col,.12);
  el.innerHTML=`<span class="lbl">${labelFor(f.type)} · S${f.signer}</span><div class="del">×</div><div class="rsz"></div>`;
  pg.wrap.appendChild(el);
  const rec={...f,id,el};
  placed.push(rec);
  positionEl(rec);
  el.querySelector('.del').addEventListener('pointerdown',ev=>{ev.stopPropagation();removeField(id);});
  el.addEventListener('pointerdown',ev=>startDrag(ev,rec));
  el.querySelector('.rsz').addEventListener('pointerdown',ev=>{ev.stopPropagation();startResize(ev,rec);});
}
function labelFor(t){ const f=FIELD_TYPES.find(x=>x.t===t); return f?f.label:t; }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function positionEl(r){
  const pg=pages.find(p=>p.pageNum===r.page);
  r.el.style.left=(r.xPct*pg.wPx)+'px';
  r.el.style.top=(r.yPct*pg.hPx)+'px';
  r.el.style.width=(r.wPct*pg.wPx)+'px';
  r.el.style.height=(r.hPct*pg.hPx)+'px';
}
function removeField(id){
  const i=placed.findIndex(p=>p.id===id);
  if(i>=0){ placed[i].el.remove(); placed.splice(i,1); }
}
function startDrag(ev,r){
  if(ev.target.classList.contains('del')||ev.target.classList.contains('rsz')) return;
  ev.preventDefault();
  const pg=pages.find(p=>p.pageNum===r.page);
  const rect=pg.wrap.getBoundingClientRect();
  const offX=ev.clientX-(rect.left+r.xPct*rect.width);
  const offY=ev.clientY-(rect.top+r.yPct*rect.height);
  function move(e){
    r.xPct=Math.max(0,Math.min(1-r.wPct,(e.clientX-rect.left-offX)/rect.width));
    r.yPct=Math.max(0,Math.min(1-r.hPct,(e.clientY-rect.top-offY)/rect.height));
    positionEl(r);
  }
  function up(){ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); }
  window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
}
function startResize(ev,r){
  ev.preventDefault();
  const pg=pages.find(p=>p.pageNum===r.page);
  const rect=pg.wrap.getBoundingClientRect();
  function move(e){
    r.wPct=Math.max(.03,Math.min(1-r.xPct,(e.clientX-rect.left)/rect.width - r.xPct));
    r.hPct=Math.max(.02,Math.min(1-r.yPct,(e.clientY-rect.top)/rect.height - r.yPct));
    positionEl(r);
  }
  function up(){ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); }
  window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
}

// ---------- load + save ----------
async function loadExisting(){
  const { data, error }=await sb.from('template_fields').select('*').eq('template_id',templateId).order('signer_order');
  if(error||!data) return;
  const maxSigner=data.reduce((m,f)=>Math.max(m,Number(f.signer_order||1)),1);
  signers=Array.from({length:maxSigner},(_,i)=>i+1); refreshSigners();
  data.forEach(f=>addField({
    type:f.field_type, signer:Number(f.signer_order||1), page:Number(f.page||1),
    xPct:Number(f.x_pct||0), yPct:Number(f.y_pct||0), wPct:Number(f.w_pct||.2), hPct:Number(f.h_pct||.04)
  }));
}
async function saveFields(){
  const btn=document.getElementById('saveBtn'); btn.disabled=true; btn.textContent='Saving…';
  const del=await sb.from('template_fields').delete().eq('template_id',templateId);
  if(del.error){ alert('Save failed: '+del.error.message); btn.disabled=false; btn.textContent='Save Fields'; return; }
  if(placed.length){
    const rows=placed.map(p=>({template_id:templateId,signer_order:p.signer,field_type:p.type,page:p.page,
      x_pct:p.xPct,y_pct:p.yPct,w_pct:p.wPct,h_pct:p.hPct,value:''}));
    const ins=await sb.from('template_fields').insert(rows);
    if(ins.error){ alert('Save failed: '+ins.error.message); btn.disabled=false; btn.textContent='Save Fields'; return; }
  }
  // record signer roles too (optional, best-effort)
  try{
    await sb.from('template_signers').delete().eq('template_id',templateId);
    await sb.from('template_signers').insert(signers.map(s=>({template_id:templateId,signer_order:s,role_label:'Signer '+s})));
  }catch(_){}
  btn.disabled=false; btn.textContent='Save Fields';
  const tag=document.getElementById('savedTag'); tag.classList.add('show'); setTimeout(()=>tag.classList.remove('show'),1800);
}
document.getElementById('saveBtn').addEventListener('click',saveFields);

// ---------- boot ----------
(async()=>{
  if(!templateId){ document.getElementById('stage').innerHTML='<div class="loading">Missing template id (open from the Templates page).</div>'; return; }
  const { data, error }=await sb.from('document_templates').select('name,file_path').eq('id',templateId).single();
  if(error||!data){ document.getElementById('stage').innerHTML='<div class="loading">Template not found.</div>'; return; }
  document.getElementById('docName').textContent=data.name||'Template';
  refreshSigners();
  buildPalette();
  const url=sb.storage.from(TEMPLATE_BUCKET).getPublicUrl(data.file_path).data.publicUrl;
  try{ await renderPdf(url); }
  catch(e){ document.getElementById('stage').innerHTML='<div class="loading">Could not load the template PDF.</div>'; return; }
  await loadExisting();
})();
</script>
</body>
</html>
