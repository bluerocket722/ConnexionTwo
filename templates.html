<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion Two | Templates</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink: #0f1b2d;
  --muted: #5f6b7a;
  --faint: #93a0b3;
  --line: #dce5f0;
  --bg: #f7f9fc;
  --surface: #ffffff;
  --blue-700: #0054d1;
  --blue-600: #0068ff;
  --blue-500: #1683ff;
  --blue-050: #eaf3ff;
  --navy: #061a3a;
  --green: #0f9f6e;
  --radius: 12px;
  --shadow: 0 1px 2px rgba(6,26,58,.04), 0 8px 28px rgba(6,26,58,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body { background: var(--bg); color: var(--ink); font-family: Inter, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; -webkit-font-smoothing: antialiased; font-size: 14px; }
a { color: inherit; text-decoration: none; }
button, input, select { font: inherit; }

/* TOP NAV */
.top-nav { height: 60px; display: flex; align-items: center; gap: 28px; padding: 0 24px; background: rgba(255,255,255,.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 50; }
.brand { display: flex; align-items: center; gap: 10px; }
.c2-logo { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; background: linear-gradient(135deg, var(--navy), var(--blue-700)); color: #fff; font-weight: 800; font-size: .8rem; letter-spacing: -.03em; }
.brand-name { font-weight: 800; font-size: 1rem; letter-spacing: -.02em; color: var(--navy); }
.nav-tabs { display: flex; align-items: center; gap: 4px; margin-left: 8px; }
.nav-tabs a { padding: 7px 14px; border-radius: 8px; color: var(--muted); font-weight: 600; font-size: .9rem; transition: .15s ease; }
.nav-tabs a:hover { color: var(--ink); background: var(--blue-050); }
.nav-tabs a.active { color: var(--blue-700); background: var(--blue-050); }
.top-actions { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.trial-left { color: var(--muted); font-weight: 600; font-size: .85rem; }
.buy-btn { height: 36px; padding: 0 16px; border-radius: 8px; background: var(--blue-700); border: none; color: #fff; font-weight: 700; font-size: .87rem; cursor: pointer; transition: .15s ease; }
.buy-btn:hover { background: var(--navy); }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; background: var(--blue-050); color: var(--blue-700); font-weight: 800; font-size: .8rem; }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 244px 1fr; min-height: calc(100vh - 60px); }
.sidebar { padding: 22px 14px; border-right: 1px solid var(--line); }
.new-btn { width: 100%; height: 42px; margin-bottom: 22px; border: none; border-radius: 10px; cursor: pointer; background: linear-gradient(135deg, var(--blue-600), var(--navy)); color: #fff; font-weight: 700; font-size: .9rem; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 20px rgba(0,84,209,.22); transition: .15s ease; }
.new-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 26px rgba(0,84,209,.28); }
.side-label { color: var(--faint); font-size: .68rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; padding: 0 12px; margin-bottom: 8px; }
.side-item { width: 100%; min-height: 40px; display: flex; align-items: center; gap: 11px; padding: 0 12px; margin-bottom: 2px; border: none; border-radius: 8px; cursor: pointer; background: var(--blue-050); color: var(--blue-700); font-weight: 700; font-size: .9rem; text-align: left; }
.side-item svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; flex: 0 0 auto; }
.side-item .count-pill { margin-left: auto; min-width: 22px; height: 20px; padding: 0 7px; border-radius: 999px; background: var(--blue-700); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 800; }

/* CONTENT */
.content { padding: 28px 32px 56px; overflow: auto; }
.content-top { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
.page-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; color: var(--navy); }
.page-count { color: var(--faint); font-size: .9rem; font-weight: 600; }
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.search { position: relative; flex: 1; min-width: 220px; max-width: 420px; }
.search input { width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface); padding: 0 14px 0 40px; outline: none; font-size: .9rem; transition: .15s ease; }
.search input:focus { border-color: var(--blue-500); box-shadow: 0 0 0 3px rgba(0,104,255,.14); }
.search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; stroke: var(--faint); stroke-width: 2; fill: none; }
.filter-btn { height: 40px; padding: 0 14px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface); color: var(--muted); font-weight: 600; font-size: .87rem; cursor: pointer; transition: .15s ease; }
.filter-btn:hover { border-color: var(--blue-500); color: var(--ink); }

/* TABLE */
.table-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.table-head, .table-row { display: grid; grid-template-columns: 1.7fr 0.9fr 0.7fr 70px; align-items: center; gap: 18px; padding: 0 22px; }
.table-head { height: 44px; color: var(--faint); font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--line); background: #fafcff; }
.table-row { min-height: 68px; border-bottom: 1px solid var(--line); transition: .12s ease; }
.table-row:last-child { border-bottom: none; }
.table-row:hover { background: #f6f9ff; }
.doc-cell { display: flex; align-items: center; gap: 12px; min-width: 0; }
.doc-icon { width: 36px; height: 36px; flex: 0 0 auto; border-radius: 9px; background: var(--blue-050); display: grid; place-items: center; }
.doc-icon svg { width: 18px; height: 18px; stroke: var(--blue-700); stroke-width: 1.8; fill: none; }
.doc-meta { min-width: 0; }
.item-title { font-weight: 700; font-size: .93rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub { color: var(--faint); font-size: .76rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; background: var(--blue-050); color: var(--blue-700); font-size: .76rem; font-weight: 700; }
.row-updated { color: var(--muted); font-size: .85rem; }
.row-action { justify-self: end; border: none; background: var(--blue-700); color: #fff; border-radius: 8px; height: 32px; padding: 0 16px; font-weight: 700; font-size: .82rem; cursor: pointer; transition: .14s ease; }
.row-action:hover { background: var(--navy); }

/* empty / loading */
.empty-state { display: none; flex-direction: column; align-items: center; text-align: center; padding: 64px 24px; }
.empty-state.show { display: flex; }
.empty-icon { width: 64px; height: 64px; border-radius: 16px; background: var(--blue-050); display: grid; place-items: center; margin-bottom: 18px; }
.empty-icon svg { width: 30px; height: 30px; stroke: var(--blue-700); stroke-width: 1.6; fill: none; }
.empty-state h2 { font-size: 1.15rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 6px; color: var(--navy); }
.empty-state p { color: var(--muted); max-width: 400px; line-height: 1.6; margin-bottom: 20px; }
.empty-cta { height: 42px; padding: 0 22px; border-radius: 9px; background: var(--blue-700); color: #fff; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; }
.empty-cta:hover { background: var(--navy); }
.loading { padding: 36px 24px; color: var(--muted); text-align: center; }
.error { padding: 36px 24px; color: #b91c1c; text-align: center; }
.hidden { display: none !important; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content { padding: 22px 16px 44px; }
  .table-head { display: none; }
  .table-row { grid-template-columns: 1fr auto; gap: 10px; padding: 16px; }
  .row-updated { display: none; }
}
</style>
</head>
<body>
  <header class="top-nav">
    <a href="/welcome" class="brand" aria-label="Connexion Two home">
      <div class="c2-logo">C2</div>
      <div class="brand-name">Connexion Two</div>
    </a>
    <nav class="nav-tabs" aria-label="Main navigation">
      <a href="/document-creation">Agreements</a>
      <a href="/templates" class="active">Templates</a>
    </nav>
    <div class="top-actions">
      <span class="trial-left">14 days left</span>
      <button class="buy-btn" type="button">Upgrade</button>
      <div class="avatar">AP</div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <button class="new-btn" type="button" id="createTemplateBtn">
        <svg viewBox="0 0 24 24" width="17" height="17" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 5v14M5 12h14"/></svg>
        New Template
      </button>
      <div class="side-label">Library</div>
      <button class="side-item" type="button">
        <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
        <span>My Templates</span><span class="count-pill" id="tplCount">0</span>
      </button>
    </aside>

    <main class="content">
      <div class="content-top">
        <h1 class="page-title">My Templates</h1>
        <span class="page-count" id="pageCount"></span>
      </div>

      <div class="toolbar">
        <div class="search">
          <svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M16 16l5 5"/></svg>
          <input id="searchInput" type="search" placeholder="Search templates" />
        </div>
        <button class="filter-btn" type="button" id="clearSearch">Clear</button>
      </div>

      <section class="table-card">
        <div class="table-head"><div>Name</div><div>Category</div><div>Updated</div><div></div></div>
        <div id="templateRows"><div class="loading">Loading templates…</div></div>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h4"/></svg></div>
          <h2>Create reusable templates</h2>
          <p>Save documents, recipients, and signing fields as templates so your team can send repeat agreements faster.</p>
          <button class="empty-cta" type="button" id="emptyCreateBtn">Create a Template</button>
        </div>
      </section>
      <input type="file" id="templateFileInput" class="hidden" accept="application/pdf,.pdf" />
    </main>
  </div>

<script>
const SB_URL = 'https://rfdvogakvyodixgpvqvz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZHZvZ2FrdnlvZGl4Z3B2cXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMzU4MDMsImV4cCI6MjA4MjYxMTgwM30.UumTuz6AaKL8uYmmNxFj1ec5CInHVNQowt6LRo4cu-E';
const TEMPLATE_BUCKET = 'template-files';
const LOGIN_URL = 'https://www.connexiontwo.com/';
const sb = supabase.createClient(SB_URL, SB_KEY);
let allTemplates = [];

function fmtDate(value) { if(!value) return ''; return new Date(value).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' }); }
function escapeHtml(value) { return String(value || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadTemplates() {
  const rows = document.getElementById('templateRows');
  const { data, error } = await sb.from('document_templates')
    .select('id,name,category,file_name,status,updated_at,created_at')
    .eq('status','active')
    .order('updated_at', { ascending:false });
  if(error) { rows.innerHTML = '<div class="error">Could not load templates. Run the templates SQL in this Supabase project.</div>'; return; }
  allTemplates = data || [];
  renderTemplates();
}

function renderTemplates() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q ? allTemplates.filter(t => String(t.name || '').toLowerCase().includes(q)) : allTemplates;
  const rows = document.getElementById('templateRows');
  const empty = document.getElementById('emptyState');
  document.getElementById('tplCount').textContent = allTemplates.length;
  document.getElementById('pageCount').textContent = filtered.length ? `${filtered.length} item${filtered.length===1?'':'s'}` : '';
  if(!filtered.length) { rows.innerHTML = ''; empty.classList.add('show'); return; }
  empty.classList.remove('show');
  rows.innerHTML = filtered.map(t => `
    <div class="table-row">
      <div class="doc-cell">
        <div class="doc-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
        <div class="doc-meta"><div class="item-title">${escapeHtml(t.name)}</div><div class="item-sub">${escapeHtml(t.file_name || 'Template')}</div></div>
      </div>
      <div><span class="cat-pill">${escapeHtml(t.category || 'General')}</span></div>
      <div class="row-updated">${fmtDate(t.updated_at || t.created_at)}</div>
      <div><button class="row-action" type="button" data-use="${escapeHtml(t.id)}">Use</button></div>
    </div>`).join('');
  rows.querySelectorAll('[data-use]').forEach(btn => btn.addEventListener('click', () => useTemplate(btn.dataset.use)));
}

function useTemplate(id) { window.location.href = '/document-creation?template=' + encodeURIComponent(id); }
function startCreateTemplate() { document.getElementById('templateFileInput').click(); }

async function createTemplateFromFile(file) {
  const name = prompt('Template name:', file.name.replace(/\.pdf$/i,''));
  if(!name) return;
  const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '-');
  const path = `tpl/${Date.now()}-${safe}`;
  const upload = await sb.storage.from(TEMPLATE_BUCKET).upload(path, file, { upsert:false, contentType:file.type || 'application/pdf' });
  if(upload.error) { alert('Upload failed: ' + upload.error.message); return; }
  const insert = await sb.from('document_templates').insert({ name, category:'General', file_path:path, file_name:file.name }).select().single();
  if(insert.error) { alert('Template record failed: ' + insert.error.message); return; }
  await loadTemplates();
}

document.getElementById('createTemplateBtn').addEventListener('click', startCreateTemplate);
document.getElementById('emptyCreateBtn').addEventListener('click', startCreateTemplate);
document.getElementById('templateFileInput').addEventListener('change', async e => { const file = e.target.files[0]; e.target.value=''; if(file) await createTemplateFromFile(file); });
document.getElementById('searchInput').addEventListener('input', renderTemplates);
document.getElementById('clearSearch').addEventListener('click', () => { document.getElementById('searchInput').value=''; renderTemplates(); });

// Auth lives in another project — load directly with the anon key.
loadTemplates();
</script>
</body>
</html>
