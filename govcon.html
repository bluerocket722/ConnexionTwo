<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion Two | AI-Powered Government Contracting</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230054d1'/%3E%3Ctext x='16' y='21' font-family='Arial' font-size='13' font-weight='800' fill='white' text-anchor='middle'%3EC2%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --blue-950:#041124; --blue-900:#061a3a; --blue-800:#082b61; --blue-700:#0054d1;
    --blue-600:#0068ff; --blue-500:#1683ff; --blue-100:#eaf3ff; --blue-050:#f5f9ff;
    --ink:#0b1220; --muted:#5a6b8c; --line:#e2e8f2; --bg:#f4f7fc; --panel:#fff;
    --good:#12a150; --warn:#c77700; --bad:#d33; --chip:#eef3fb;
    --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  a{color:var(--blue-700);text-decoration:none}
  /* ── shell ── */
  .app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .side{background:linear-gradient(180deg,var(--blue-900),var(--blue-950));color:#dce8ff;
    padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto}
  .brand{display:flex;align-items:center;gap:10px;margin:0 6px 22px}
  .brand .mark{width:38px;height:38px;border-radius:10px;flex:0 0 auto;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--blue-600),var(--blue-900));display:grid;place-items:center;letter-spacing:-.5px}
  .brand .nm{font-weight:800;font-size:15px;letter-spacing:-.3px;color:#fff}
  .brand .sub{font-size:10.5px;color:#8fb4f0;letter-spacing:.3px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:#c6d8f7;
    font-size:14px;font-weight:600;cursor:pointer;margin-bottom:2px}
  .nav a .ic{width:18px;text-align:center}
  .nav a:hover{background:rgba(255,255,255,.06)}
  .nav a.active{background:var(--blue-700);color:#fff}
  .nav .sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:#6f92c8;margin:16px 12px 6px}
  .main{padding:26px 30px 70px;max-width:1180px}
  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .topbar h1{font-size:23px;margin:0;letter-spacing:-.4px;color:var(--blue-950)}
  .topbar .who{margin-left:auto;font-size:13px;color:var(--muted)}
  .topbar .who b{color:var(--ink)}
  /* ── components ── */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .cards{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .kpi .lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--blue-800);margin-top:4px}
  .kpi .sub{font-size:12px;color:var(--muted)}
  h2.section{font-size:15px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:26px 0 12px}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;
    padding:9px 14px;font-size:13.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--blue-500)}
  .btn.primary{background:var(--blue-700);color:#fff;border:none;box-shadow:0 10px 24px rgba(0,84,209,.22)}
  .btn.primary:hover{background:var(--blue-800)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:0 0 5px}
  input,textarea,select{width:100%;background:var(--blue-050);border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--ink)}
  textarea{min-height:80px;resize:vertical}
  .field{margin-bottom:13px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--chip);color:var(--blue-700)}
  .pill.high{background:#fde8e8;color:var(--bad)} .pill.medium{background:#fff3e0;color:var(--warn)} .pill.low{background:#e8f5ee;color:var(--good)}
  .rfp{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;background:#fff}
  .rfp .t{font-weight:700;font-size:15px;color:var(--blue-900)}
  .rfp .m{font-size:12.5px;color:var(--muted);margin:3px 0}
  .rfp .scores{display:flex;gap:8px;flex-wrap:wrap;margin-top:7px}
  .rfp .acts{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .board{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;overflow-x:auto}
  .col{background:var(--blue-050);border:1px solid var(--line);border-radius:12px;padding:9px;min-width:150px}
  .col h4{margin:0 0 8px;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:flex;justify-content:space-between}
  .col .n{background:#fff;border:1px solid var(--line);color:var(--muted);border-radius:12px;padding:0 7px;font-size:11px}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px;margin-bottom:8px;font-size:12.5px}
  .pcard .pt{font-weight:700;color:var(--blue-900);font-size:12.5px}
  .pcard select{padding:4px 6px;font-size:11px;margin-top:6px}
  .tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:13px}
  .tool{border:1px solid var(--line);border-radius:12px;padding:15px;background:#fff;cursor:pointer;transition:border-color .15s}
  .tool:hover{border-color:var(--blue-500);box-shadow:0 10px 24px rgba(6,26,58,.07)}
  .tool .ic{font-size:24px} .tool .nm{font-weight:800;margin:8px 0 3px;color:var(--blue-900)} .tool .d{font-size:12.5px;color:var(--muted)}
  .out{white-space:pre-wrap;font-size:13.5px;background:var(--blue-050);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:12px;max-height:460px;overflow:auto}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:600;margin-bottom:10px}
  .toggle input{width:auto}
  .banner{border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:16px;border:1px solid}
  .banner.info{background:var(--blue-100);border-color:#bcd8ff}
  .banner.warn{background:#fff8ec;border-color:#f2d79a}
  .banner.bad{background:#fdeaea;border-color:#f2b4b4;color:var(--bad)}
  .muted{color:var(--muted)} .center{text-align:center}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--chip);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:12px;display:flex;align-items:center;gap:6px}
  .chip .x{cursor:pointer;color:var(--muted);font-weight:800}
  .hide{display:none!important}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #fff6;border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  /* ── auth ── */
  #auth{position:fixed;inset:0;background:linear-gradient(135deg,var(--blue-900),var(--blue-950));
    display:grid;place-items:center;padding:20px;z-index:50}
  #auth .box{background:#fff;border-radius:18px;padding:30px;max-width:400px;width:100%}
  #auth .mark{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--blue-600),var(--blue-900));
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;margin-bottom:14px}
  #auth h2{margin:0 0 4px;color:var(--blue-950)} #auth p{margin:0 0 18px;color:var(--muted);font-size:13.5px}
  @media(max-width:860px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.board{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth">
  <div class="box">
    <div class="mark">C2</div>
    <h2>Connexion Two</h2>
    <p>AI-Powered Government Contracting Platform</p>
    <div class="field"><label>Email</label><input id="authEmail" type="email" placeholder="you@company.com"></div>
    <div class="field"><label>Password</label><input id="authPass" type="password" placeholder="••••••••"></div>
    <div id="authErr" class="banner bad hide"></div>
    <button class="btn primary" id="btnSignIn" style="width:100%;justify-content:center">Sign in</button>
    <button class="btn" id="btnSignUp" style="width:100%;justify-content:center;margin-top:8px">Create account</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="app hide" id="app">
  <aside class="side">
    <div class="brand">
      <div class="mark">C2</div>
      <div><div class="nm">Connexion Two</div><div class="sub">GOVERNMENT CONTRACTING</div></div>
    </div>
    <nav class="nav" id="nav">
      <a data-view="dashboard" class="active"><span class="ic">▚</span>Dashboard</a>
      <a data-view="rfps"><span class="ic">▤</span>RFP Discovery</a>
      <a data-view="autopilot"><span class="ic">✈</span>Autopilot</a>
      <a data-view="sources"><span class="ic">◎</span>Custom Sources</a>
      <a data-view="ai"><span class="ic">✦</span>AI Tools</a>
      <a data-view="pipeline"><span class="ic">▦</span>Pipeline</a>
      <a data-view="awards"><span class="ic">◆</span>Awards Research</a>
      <a data-view="partners"><span class="ic">◈</span>Partner Network</a>
      <a data-view="analytics"><span class="ic">▲</span>Analytics</a>
      <div class="sec">Account</div>
      <a data-view="profile"><span class="ic">◐</span>Profile &amp; Settings</a>
      <a id="btnSignOut"><span class="ic">⏻</span>Sign out</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 id="viewTitle">Dashboard</h1>
      <div class="who">Signed in as <b id="whoEmail"></b></div>
    </div>
    <div id="views"></div>
  </main>
</div>

<script>
/* ═══════════════ CONFIG ═══════════════
   Same project as intake.html. On replication, the Replicator's find/replace
   swaps these for the customer's own Supabase project + anon key. */
const SB_URL = window.SB_URL || 'https://rfdvogakvyodixgpvqvz.supabase.co';
const SB_KEY = window.SB_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZHZvZ2FrdnlvZGl4Z3B2cXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMzU4MDMsImV4cCI6MjA4MjYxMTgwM30.UumTuz6AaKL8uYmmNxFj1ec5CInHVNQowt6LRo4cu-E';
const sb = supabase.createClient(SB_URL, SB_KEY);
const FN = (name) => `${SB_URL}/functions/v1/${name}`;

let SESSION = null, PROFILE = null;
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDate = (d) => d ? new Date(d).toLocaleDateString() : '—';

/* REST + function helpers (authenticated as the user).
   Always pull a FRESH token from supabase-js — it auto-refreshes sessions,
   so this never sends an expired JWT. If the session is truly gone
   (signed out elsewhere / refresh token revoked), bounce to sign-in. */
async function freshToken() {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) { toast('Session expired — please sign in again'); setTimeout(()=>location.reload(), 1200); throw new Error('Signed out'); }
  SESSION = session;
  return session.access_token;
}
async function api(path, opts={}) {
  const token = await freshToken();
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    ...opts,
    headers: { apikey: SB_KEY, Authorization: `Bearer ${token}`,
      'Content-Type':'application/json', Prefer: opts.prefer || 'return=representation', ...(opts.headers||{}) },
  });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  return res.status === 204 ? null : res.json();
}
async function callFn(name, body) {
  const token = await freshToken();
  const res = await fetch(FN(name), {
    method:'POST', headers:{ apikey:SB_KEY, Authorization:`Bearer ${token}`, 'Content-Type':'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

/* ═══════════════ AUTH ═══════════════ */
$('#btnSignIn').onclick = () => auth('in');
$('#btnSignUp').onclick = () => auth('up');
async function auth(mode) {
  const email = $('#authEmail').value.trim(), password = $('#authPass').value;
  const err = $('#authErr'); err.classList.add('hide');
  const fn = mode==='in' ? sb.auth.signInWithPassword({email,password}) : sb.auth.signUp({email,password});
  const { data, error } = await fn;
  if (error) { err.textContent = error.message; err.classList.remove('hide'); return; }
  if (mode==='up' && !data.session) { err.textContent='Check your email to confirm, then sign in.'; err.classList.remove('hide'); return; }
  boot(data.session);
}
$('#btnSignOut').onclick = async () => { await sb.auth.signOut(); location.reload(); };

async function boot(session) {
  SESSION = session;
  sb.auth.onAuthStateChange((_evt, s) => { if (s) SESSION = s; });   // keep token fresh
  $('#auth').classList.add('hide'); $('#app').classList.remove('hide');
  $('#whoEmail').textContent = session.user.email;
  const rows = await api(`govcon_profiles?user_id=eq.${session.user.id}&select=*`);
  PROFILE = rows[0] || null;
  if (!PROFILE) { // first login → create a profile row + default autopilot settings
    PROFILE = (await api('govcon_profiles', {method:'POST', body:JSON.stringify({user_id:session.user.id})}))[0];
    await api('govcon_autopilot_settings', {method:'POST', prefer:'resolution=ignore-duplicates',
      body:JSON.stringify({owner:session.user.id})}).catch(()=>{});
  }
  route('dashboard');
}

/* ═══════════════ ROUTER ═══════════════ */
$('#nav').addEventListener('click', e => {
  const a = e.target.closest('a[data-view]'); if (a) route(a.dataset.view);
});
const TITLES = {dashboard:'Dashboard',rfps:'RFP Discovery',autopilot:'Autopilot',sources:'Custom Sources',
  ai:'AI Tools',pipeline:'Pipeline',awards:'Awards Research',partners:'Partner Network',analytics:'Analytics',profile:'Profile & Settings'};
function route(view) {
  $$('#nav a[data-view]').forEach(a => a.classList.toggle('active', a.dataset.view===view));
  $('#viewTitle').textContent = TITLES[view] || view;
  ({dashboard:renderDashboard,rfps:renderRfps,autopilot:renderAutopilot,sources:renderSources,
    ai:renderAi,pipeline:renderPipeline,awards:renderAwards,partners:renderPartners,analytics:renderAnalytics,profile:renderProfile}[view]||renderDashboard)();
}
const V = () => $('#views');
const loading = () => V().innerHTML = '<div class="card center muted">Loading…</div>';

/* ═══════════════ DASHBOARD ═══════════════ */
async function renderDashboard() {
  loading();
  const uid = SESSION.user.id;
  const [rfps, pipeline, proposals, runs] = await Promise.all([
    api(`govcon_rfps?owner=eq.${uid}&select=id,status,priority,win_probability`),
    api(`govcon_pipeline_items?owner=eq.${uid}&select=id,stage`),
    api(`govcon_proposals?owner=eq.${uid}&select=id,status`),
    api(`govcon_autopilot_runs?owner=eq.${uid}&select=*&order=started_at.desc&limit=5`),
  ]);
  const awarded = pipeline.filter(p=>p.stage==='awarded').length;
  const closed = pipeline.filter(p=>p.stage==='awarded'||p.stage==='lost').length;
  const winRate = closed ? Math.round(awarded/closed*100) : 0;
  V().innerHTML = `
    <div class="cards kpis">
      ${kpi('Total RFPs', rfps.length, 'all opportunities')}
      ${kpi('Pipeline', pipeline.length, 'actively pursuing')}
      ${kpi('Proposals', proposals.length, 'drafts & submissions')}
      ${kpi('Win Rate', winRate+'%', `${awarded} of ${closed} closed`)}
    </div>
    <h2 class="section">Quick actions</h2>
    <div class="card"><div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn primary" onclick="route('rfps')">Discover RFPs</button>
      <button class="btn" onclick="route('ai')">Create Proposal</button>
      <button class="btn" onclick="route('pipeline')">View Pipeline</button>
      <button class="btn" onclick="runAutopilotNow()">✈ Run Autopilot</button>
    </div></div>
    <h2 class="section">Recent Autopilot runs</h2>
    <div class="card">${runs.length ? runs.map(r=>`
      <div class="rfp" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between">
          <b>${fmtDate(r.started_at)}</b>
          <span class="pill ${r.status==='error'?'high':'low'}">${r.status}</span>
        </div>
        <div class="m">Found ${r.rfps_found} · New ${r.new_rfps} · High-priority ${r.high_priority} · Proposals ${r.proposals_generated} · Pipeline +${r.added_to_pipeline}</div>
        ${r.error?`<div class="m" style="color:var(--bad)">${esc(r.error)}</div>`:''}
      </div>`).join('') : '<p class="muted">No runs yet. Configure Autopilot and run it.</p>'}
    </div>`;
}
const kpi = (l,v,s) => `<div class="card kpi"><div class="lbl">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`;

/* ═══════════════ RFP DISCOVERY ═══════════════ */
let RFP_FILTER = '', RFP_DUE_FROM = '', RFP_DUE_TO = '';
const RFP_SEL = new Set();
async function renderRfps() {
  loading();
  const uid = SESSION.user.id;
  const rfps = await api(`govcon_rfps?owner=eq.${uid}&select=*&order=deadline.asc.nullslast&limit=500`);
  const q = RFP_FILTER.toLowerCase();
  const shown = rfps.filter(r => {
    if (q && !`${r.title} ${r.agency} ${r.category} ${r.description||''}`.toLowerCase().includes(q)) return false;
    if (RFP_DUE_FROM && (!r.deadline || r.deadline < RFP_DUE_FROM)) return false;
    if (RFP_DUE_TO && (!r.deadline || r.deadline > RFP_DUE_TO)) return false;
    return true;
  });
  const shownIds = new Set(shown.map(r=>r.id));
  for (const id of [...RFP_SEL]) if (!rfps.some(r=>r.id===id)) RFP_SEL.delete(id); // prune stale
  const allShownSelected = shown.length>0 && shown.every(r=>RFP_SEL.has(r.id));
  V().innerHTML = `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <input id="rfpSearch" placeholder="Filter by keyword (title, agency, description)…" value="${esc(RFP_FILTER)}" style="flex:1;min-width:200px">
        <label style="margin:0">Due from</label><input id="rfpDueFrom" type="date" value="${RFP_DUE_FROM}" style="width:auto">
        <label style="margin:0">to</label><input id="rfpDueTo" type="date" value="${RFP_DUE_TO}" style="width:auto">
        <button class="btn sm" id="rfpClear">Clear filters</button>
        <button class="btn primary" onclick="runAutopilotNow()">✈ Run Autopilot</button>
        <button class="btn" onclick="showAddRfp()">+ Add RFP</button>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px;border-top:1px solid var(--line);padding-top:12px">
        <label class="toggle" style="margin:0"><input type="checkbox" id="selAllRfps" ${allShownSelected?'checked':''}> Select all shown (${shown.length})</label>
        <b id="rfpSelCount" class="muted">${RFP_SEL.size} selected</b>
        <span style="flex:1"></span>
        <button class="btn sm" id="bulkPipe" ${RFP_SEL.size?'':'disabled'}>+ Pipeline selected</button>
        <button class="btn sm" id="bulkDel" style="color:var(--bad)" ${RFP_SEL.size?'':'disabled'}>Delete selected</button>
        <button class="btn sm" id="bulkClear" ${RFP_SEL.size?'':'disabled'}>Clear selection</button>
      </div>
    </div>
    <div id="addRfpBox"></div>
    <div class="muted" style="margin-bottom:10px">${shown.length} of ${rfps.length} opportunities · sorted by due date</div>
    <div id="rfpList">${shown.map(rfpCard).join('') || '<div class="card center muted">Nothing matches these filters.</div>'}</div>`;
  $('#rfpSearch').oninput = (e) => { RFP_FILTER = e.target.value; clearTimeout(window._rt); window._rt = setTimeout(renderRfps, 250); };
  $('#rfpDueFrom').onchange = (e) => { RFP_DUE_FROM = e.target.value; renderRfps(); };
  $('#rfpDueTo').onchange = (e) => { RFP_DUE_TO = e.target.value; renderRfps(); };
  $('#rfpClear').onclick = () => { RFP_FILTER=RFP_DUE_FROM=RFP_DUE_TO=''; renderRfps(); };
  $('#selAllRfps').onchange = (e) => {
    if (e.target.checked) shownIds.forEach(id=>RFP_SEL.add(id)); else shownIds.forEach(id=>RFP_SEL.delete(id));
    renderRfps();
  };
  $('#rfpList').addEventListener('change', (e) => {
    const cb = e.target.closest('.selrfp'); if (!cb) return;
    if (cb.checked) RFP_SEL.add(cb.dataset.id); else RFP_SEL.delete(cb.dataset.id);
    $('#rfpSelCount').textContent = `${RFP_SEL.size} selected`;
    ['bulkPipe','bulkDel','bulkClear'].forEach(b=>$('#'+b).disabled = !RFP_SEL.size);
  });
  $('#bulkClear').onclick = () => { RFP_SEL.clear(); renderRfps(); };
  $('#bulkDel').onclick = bulkDeleteRfps;
  $('#bulkPipe').onclick = bulkPipelineRfps;
}
async function bulkDeleteRfps() {
  const ids = [...RFP_SEL];
  if (!ids.length || !confirm(`Delete ${ids.length} RFP(s)? Their pipeline entries are removed too.`)) return;
  for (let i=0; i<ids.length; i+=50)                      // batch: keep URLs short
    await api(`govcon_rfps?id=in.(${ids.slice(i,i+50).join(',')})`, {method:'DELETE', prefer:'return=minimal'});
  RFP_SEL.clear();
  toast(`Deleted ${ids.length} RFP(s)`);
  renderRfps();
}
async function bulkPipelineRfps() {
  const ids = [...RFP_SEL]; if (!ids.length) return;
  const items = ids.map(id=>({owner:SESSION.user.id, rfp_id:id, stage:'lead'}));
  await api('govcon_pipeline_items?on_conflict=owner,rfp_id', {method:'POST',
    prefer:'resolution=ignore-duplicates,return=minimal', body:JSON.stringify(items)});
  toast(`Added ${ids.length} to pipeline`);
  RFP_SEL.clear();
  renderRfps();
}

    <span class="pill ${i.priority}">${i.priority}</span>
    <select onchange="moveStage('${i.id}',this.value)">${STAGES.map(([k,l])=>`<option value="${k}" ${k===i.stage?'selected':''}>${l}</option>`).join('')}</select>
  </div>`;
}
async function moveStage(id, stage) {
  await api(`govcon_pipeline_items?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({stage, stage_updated_at:new Date().toISOString()})});
  renderPipeline();
}

/* ═══════════════ AWARDS RESEARCH ═══════════════ */
let AWARD_SORT = 'amount';
async function renderAwards() {
  loading();
  const order = AWARD_SORT==='amount' ? 'amount.desc.nullslast' : 'award_date.desc.nullslast';
  const rows = await api(`govcon_awards?owner=eq.${SESSION.user.id}&select=*&order=${order}&limit=300`);
  const money = (v) => v==null ? '—' : '$'+Number(v).toLocaleString();
  V().innerHTML = `
    <div class="banner info">Previously <b>won</b> contracts from SAM.gov award notices matching your keywords and NAICS codes — with the awarded amount, so you can see what this work actually pays. Uses your saved Autopilot keywords.</div>
    <div class="card" style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn primary" id="awSearch">◆ Search awarded contracts</button>
      <label style="margin:0">Look back</label>
      <select id="awLookback" style="width:auto">
        <option value="90">90 days</option><option value="180">180 days</option><option value="365" selected>1 year</option>
      </select>
      <label style="margin:0">Sort by</label>
      <select id="awSort" style="width:auto">
        <option value="amount" ${AWARD_SORT==='amount'?'selected':''}>Amount (high → low)</option>
        <option value="date" ${AWARD_SORT==='date'?'selected':''}>Award date (newest)</option>
      </select>
      <span class="muted">${rows.length} stored</span>
    </div>
    <div id="awList">${rows.map(a=>`<div class="rfp">
      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap">
        <div class="t">${esc(a.title)}</div>
        <div class="t" style="color:var(--good);white-space:nowrap">${money(a.amount)}</div>
      </div>
      <div class="m">${esc(a.agency||'—')} · awarded ${fmtDate(a.award_date)} · NAICS ${esc(a.naics||'—')}${a.set_aside?` · ${esc(a.set_aside)}`:''}</div>
      ${a.awardee?`<div class="m">Won by: <b>${esc(a.awardee)}</b></div>`:''}
      <div class="acts">${a.url?`<a class="btn sm" href="${esc(a.url)}" target="_blank">View notice ↗</a>`:''}
        <button class="btn sm" style="color:var(--bad)" onclick="delAward('${a.id}')">Remove</button></div>
    </div>`).join('') || '<div class="card center muted">No awards stored yet — click "Search awarded contracts".</div>'}</div>`;
  $('#awSort').onchange = (e)=>{ AWARD_SORT=e.target.value; renderAwards(); };
  $('#awSearch').onclick = async () => {
    const b=$('#awSearch'); b.disabled=true; b.textContent='Searching…';
    try {
      const r = await callFn('autopilot-run', {action:'awards', lookback_days:+$('#awLookback').value});
      toast(`Awards: ${r.found} found, ${r.new_awards} new`);
      renderAwards();
    } catch(e){ toast('Award search failed: '+e.message); b.disabled=false; b.textContent='◆ Search awarded contracts'; }
  };
}
async function delAward(id){ await api(`govcon_awards?id=eq.${id}`,{method:'DELETE',prefer:'return=minimal'}); renderAwards(); }

/* ═══════════════ PARTNERS ═══════════════ */
async function renderPartners() {
  loading();
  const [all, mine] = await Promise.all([
    api(`govcon_partners?select=*&order=created_at.desc&limit=200`),
    api(`govcon_partners?owner=eq.${SESSION.user.id}&select=id`),
  ]);
  const mineIds = new Set(mine.map(m=>m.id));
  V().innerHTML = `
    <div class="banner info">Find teaming partners to fill capability gaps and strengthen bids. List your own company so others can find you.</div>
    <button class="btn primary" onclick="showAddPartner()" style="margin-bottom:14px">+ List my company</button>
    <div id="addPartnerBox"></div>
    ${all.map(p=>`<div class="rfp">
      <div class="t">${esc(p.company_name)} ${mineIds.has(p.id)?'<span class="pill">you</span>':''}</div>
      <div class="m">${esc(p.location||'')} ${p.contact_email?'· '+esc(p.contact_email):''}</div>
      ${p.description?`<div class="m">${esc(p.description)}</div>`:''}
      <div class="chips" style="margin-top:6px">${(p.capabilities||[]).map(c=>`<span class="chip">${esc(c)}</span>`).join('')}${(p.certifications||[]).map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>
      ${!mineIds.has(p.id)?`<div class="acts"><button class="btn sm primary" onclick="requestPartner('${p.id}','${esc(p.company_name)}')">Request to team</button></div>`:''}
    </div>`).join('') || '<div class="card center muted">No partners listed yet.</div>'}`;
}
function showAddPartner() {
  $('#addPartnerBox').innerHTML = `<div class="card" style="margin-bottom:14px">
    <div class="field"><label>Company name *</label><input id="p_name" value="${esc(PROFILE?.company_name||'')}"></div>
    <div class="field"><label>Description</label><textarea id="p_desc"></textarea></div>
    <div class="row2"><div class="field"><label>Capabilities (comma-separated)</label><input id="p_caps"></div>
      <div class="field"><label>Certifications</label><input id="p_certs" value="${esc((PROFILE?.certifications||[]).join(', '))}"></div></div>
    <div class="row2"><div class="field"><label>Location</label><input id="p_loc"></div>
      <div class="field"><label>Contact email</label><input id="p_email" value="${esc(SESSION.user.email)}"></div></div>
    <button class="btn primary" onclick="savePartner()">Publish listing</button>
  </div>`;
}
async function savePartner() {
  const company_name=$('#p_name').value.trim(); if(!company_name) return alert('Company name required');
  await api('govcon_partners',{method:'POST',body:JSON.stringify({
    owner:SESSION.user.id, company_name, description:$('#p_desc').value.trim()||null,
    capabilities:$('#p_caps').value.split(',').map(s=>s.trim()).filter(Boolean),
    certifications:$('#p_certs').value.split(',').map(s=>s.trim()).filter(Boolean),
    location:$('#p_loc').value.trim()||null, contact_email:$('#p_email').value.trim()||null,
  })});
  renderPartners();
}
async function requestPartner(id, name) {
  const message = prompt(`Message to ${name}:`, 'We would like to explore teaming on an upcoming opportunity.');
  if (message===null) return;
  await api('govcon_partner_requests',{method:'POST',body:JSON.stringify({from_owner:SESSION.user.id,to_partner:id,message})});
  toast('Teaming request sent');
}

/* ═══════════════ ANALYTICS ═══════════════ */
async function renderAnalytics() {
  loading();
  const uid = SESSION.user.id;
  const [pipeline, proposals] = await Promise.all([
    api(`govcon_pipeline_items?owner=eq.${uid}&select=stage`),
    api(`govcon_proposals?owner=eq.${uid}&select=id,status`),
  ]);
  const byStage = Object.fromEntries(STAGES.map(([k])=>[k, pipeline.filter(p=>p.stage===k).length]));
  const awarded = byStage.awarded||0, lost = byStage.lost||0, closed = awarded+lost;
  const winRate = closed ? Math.round(awarded/closed*100) : 0;
  const leads = pipeline.length;
  const conv = leads ? Math.round(awarded/leads*100) : 0;
  V().innerHTML = `
    <div class="cards kpis">
      ${kpi('Win Rate', winRate+'%', `${awarded}/${closed} closed`)}
      ${kpi('Conversion', conv+'%', 'lead → award')}
      ${kpi('Proposals', proposals.length, 'total generated')}
      ${kpi('Active', (leads-closed), 'in pipeline')}
    </div>
    <h2 class="section">Pipeline by stage</h2>
    <div class="card">${STAGES.map(([k,l])=>{
      const n = byStage[k]||0; const pct = leads ? Math.round(n/leads*100) : 0;
      return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px"><b>${l}</b><span class="muted">${n}</span></div>
        <div style="background:var(--blue-050);border-radius:8px;height:12px;overflow:hidden;margin-top:3px"><div style="width:${pct}%;height:100%;background:var(--blue-600)"></div></div></div>`;
    }).join('')}</div>`;
}

/* ═══════════════ PROFILE & SETTINGS ═══════════════ */
async function renderProfile() {
  loading();
  const p = PROFILE || {};
  const pref = p.preferences || {};
  V().innerHTML = `<div class="card">
    <h2 class="section" style="margin-top:0">Company profile</h2>
    <div class="row2">
      <div class="field"><label>Company name</label><input id="pf_company" value="${esc(p.company_name||'')}"></div>
      <div class="field"><label>Legal business name</label><input id="pf_legal" value="${esc(p.legal_name||'')}"></div>
    </div>
    <div class="row2">
      <div class="field"><label>UEI</label><input id="pf_uei" value="${esc(p.uei||'')}"></div>
      <div class="field"><label>CAGE code</label><input id="pf_cage" value="${esc(p.cage||'')}"></div>
    </div>
    <div class="field"><label>NAICS codes (comma-separated, up to 5)</label><input id="pf_naics" value="${esc((p.naics||[]).join(', '))}"></div>
    <div class="row2">
      <div class="field"><label>Business size</label><input id="pf_size" value="${esc(p.business_size||'')}" placeholder="Small / Large"></div>
      <div class="field"><label>Certifications (comma-separated)</label><input id="pf_certs" value="${esc((p.certifications||[]).join(', '))}" placeholder="8(a), WOSB, HUBZone, SDVOSB"></div>
    </div>
    <div class="field"><label>Capabilities statement</label><textarea id="pf_caps">${esc(p.capabilities||'')}</textarea></div>

    <h2 class="section">Preferences</h2>
    <div class="row2">
      <div class="field"><label>Categories of interest</label><input id="pf_cats" value="${esc((pref.categories||[]).join(', '))}" placeholder="IT, Construction, Professional Services"></div>
      <div class="field"><label>Geographic preference</label><input id="pf_geo" value="${esc(pref.geo||'')}"></div>
    </div>
    <button class="btn primary" onclick="saveProfile()">Save profile</button>
  </div>
  <div class="card" style="margin-top:16px">
    <h2 class="section" style="margin-top:0">API keys</h2>
    <div class="muted" style="font-size:12.5px;margin-bottom:12px">
      Add as many labeled keys as you want. Autopilot and Awards Research use your newest
      <b>sam.gov</b> key automatically. Keys for other portals (eMMA, Ohio, …) are stored for
      those sources as they come online — pair them with a Custom Source for now.
    </div>
    <div id="keyList" class="muted">Loading…</div>
    <h2 class="section">Add a key</h2>
    <div class="row3">
      <div class="field"><label>Label</label><input id="k_label" placeholder="My SAM key"></div>
      <div class="field"><label>Provider</label>
        <select id="k_provider">
          <option value="sam.gov">sam.gov</option>
          <option value="emma">eMMA (Maryland)</option>
          <option value="ohio">Ohio</option>
          <option value="other">other…</option>
        </select></div>
      <div class="field"><label>Key</label><input id="k_value" placeholder="paste key"></div>
    </div>
    <div class="field hide" id="k_otherBox"><label>Provider name</label><input id="k_other" placeholder="e.g. texas-smartbuy"></div>
    <button class="btn primary" onclick="addKey()">Add key</button>
  </div>`;
  $('#k_provider').onchange = (e)=>$('#k_otherBox').classList.toggle('hide', e.target.value!=='other');
  loadKeys();
}
async function loadKeys() {
  const rows = await api(`govcon_api_keys?owner=eq.${SESSION.user.id}&select=id,label,provider,key_value,created_at&order=created_at.desc`);
  const mask = (v)=> v.length>10 ? v.slice(0,6)+'…'+v.slice(-4) : '••••';
  $('#keyList').innerHTML = rows.length ? rows.map(k=>`
    <div class="rfp" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div><b>${esc(k.label)}</b> <span class="pill">${esc(k.provider)}</span>
        <span class="muted" style="font-family:monospace;font-size:12px">${esc(mask(k.key_value))}</span></div>
      <button class="btn sm" style="color:var(--bad)" onclick="delKey('${k.id}')">Delete</button>
    </div>`).join('') : '<p class="muted">No keys yet.</p>';
}
async function addKey() {
  const label=$('#k_label').value.trim(), value=$('#k_value').value.trim();
  let provider=$('#k_provider').value;
  if (provider==='other') provider = $('#k_other').value.trim().toLowerCase();
  if (!label||!value||!provider) return alert('Label, provider, and key are all required.');
  await api('govcon_api_keys',{method:'POST',body:JSON.stringify({owner:SESSION.user.id,label,provider,key_value:value})});
  $('#k_label').value=$('#k_value').value='';
  toast('Key saved'); loadKeys();
}
async function delKey(id){ if(!confirm('Delete this key?'))return; await api(`govcon_api_keys?id=eq.${id}`,{method:'DELETE',prefer:'return=minimal'}); loadKeys(); }
async function saveProfile() {
  const body = {
    company_name:$('#pf_company').value.trim()||null, legal_name:$('#pf_legal').value.trim()||null,
    uei:$('#pf_uei').value.trim()||null, cage:$('#pf_cage').value.trim()||null,
    naics:$('#pf_naics').value.split(',').map(s=>s.trim()).filter(Boolean),
    business_size:$('#pf_size').value.trim()||null,
    certifications:$('#pf_certs').value.split(',').map(s=>s.trim()).filter(Boolean),
    capabilities:$('#pf_caps').value.trim()||null,
    preferences:{categories:$('#pf_cats').value.split(',').map(s=>s.trim()).filter(Boolean), geo:$('#pf_geo').value.trim()},
    updated_at:new Date().toISOString(),
  };
  const rows = await api(`govcon_profiles?user_id=eq.${SESSION.user.id}`, {method:'PATCH', body:JSON.stringify(body)});
  PROFILE = rows[0] || {...PROFILE, ...body};
  toast('Profile saved');
}

/* ═══════════════ TOAST ═══════════════ */
function toast(msg, sticky) {
  let t = $('#toast'); if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--blue-900);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:60;box-shadow:0 12px 30px rgba(0,0,0,.25)';
    document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(window._tt); if(!sticky) window._tt = setTimeout(()=>t.style.opacity='0', 3200);
}

/* ═══════════════ INIT ═══════════════ */
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) boot(data.session);
})();
</script>
